name: CI
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.13t"
          - "3.14"
          - "3.14t"
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: ${{ matrix.python-version }}
          python-version: ${{ matrix.python-version }}
          activate-environment: true
      - name: Install
        run: uv sync --inexact --extra dev --extra lsp
      - name: Test
        run: uv run --extra dev --extra lsp pytest
      - name: Pyright
        run: uv run --extra dev pyright
  
  pyrefly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
      - name: Install
        run: uv sync --inexact --extra dev
      - name: Pyrefly
        run: uv run --extra dev pyrefly check -c pyproject.toml

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
      - name: Install
        run: uv sync --inexact --extra docs
      - name: Docs
        run: |
          uv run --extra docs python scripts/document_rules.py
          uv run --extra docs sphinx-build -ab html docs html
      - name: Generated changes
        run: git diff --exit-code

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          python-version: '3.12'
          activate-environment: true
      - name: Install
        run: uv sync --inexact --extra dev
      - name: Build
        run: uv build
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
